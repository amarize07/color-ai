<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولّد لوحة ألوان - PaletteNet</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
        body { background: linear-gradient(145deg, #eceff4 0%, #d8dee9 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; padding: 20px; }
        .card { max-width: 750px; width: 100%; background: rgba(255,255,255,0.9); border-radius: 48px; padding: 24px; box-shadow: 0 20px 35px rgba(0,0,0,0.1); text-align: center; }
        h1 { font-size: 2rem; color: #2e3440; }
        .color-row { display: flex; justify-content: center; align-items: center; gap: 20px; flex-wrap: wrap; margin: 20px 0; background: #fff; padding: 20px; border-radius: 60px; }
        .preview { width: 80px; height: 80px; border-radius: 40px; border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        input[type="color"] { width: 70px; height: 70px; border: none; background: transparent; cursor: pointer; border-radius: 35px; }
        .hex-input { font-family: monospace; font-size: 1.2rem; padding: 10px 18px; border-radius: 48px; border: 1px solid #ccc; text-align: center; width: 140px; }
        button { background: #5e81ac; border: none; padding: 12px 28px; border-radius: 40px; color: white; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.2s; }
        button:hover { background: #81a1c1; transform: scale(0.97); }
        .palette { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 30px; }
        .color-card { width: 110px; background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 8px 12px rgba(0,0,0,0.1); }
        .swatch { height: 110px; width: 100%; }
        .hex-label { padding: 10px; font-family: monospace; font-size: 0.8rem; font-weight: bold; text-align: center; }
        .status { margin-top: 20px; padding: 8px 16px; border-radius: 40px; display: inline-block; background: #e5e9f0; color: #4c566a; }
    </style>
</head>
<body>
<div class="card">
    <h1>🎨 PaletteNet</h1>
    <p>أدخل لونك، وسأولد لك 3 ألوان متناسقة</p>
    <div class="color-row">
        <div class="preview" id="preview" style="background-color: #3498db;"></div>
        <input type="color" id="colorPicker" value="#3498db">
        <input type="text" id="hexInput" class="hex-input" value="#3498db">
        <button id="generateBtn">✨ توليد اللوحة</button>
    </div>
    <div class="status" id="statusMsg">⏳ جاري تحميل النموذج...</div>
    <div id="paletteContainer" class="palette"></div>
</div>

<script>
    let model = null;
    let modelReady = false;

    function hexToRgb(hex) {
        return [
            parseInt(hex.slice(1,3), 16) / 255,
            parseInt(hex.slice(3,5), 16) / 255,
            parseInt(hex.slice(5,7), 16) / 255
        ];
    }

    function rgbToHex(rgb) {
        const toHex = (v) => Math.floor(v * 255).toString(16).padStart(2, '0');
        return `#${toHex(rgb[0])}${toHex(rgb[1])}${toHex(rgb[2])}`;
    }

    async function loadModel() {
        const modelUrl = new URL('model.json', window.location).href;
        const status = document.getElementById('statusMsg');
        try {
            model = await tf.loadLayersModel(modelUrl);
            modelReady = true;
            status.innerHTML = '✅ النموذج جاهز. اختر لوناً واضغط توليد.';
            status.style.background = '#cfe8cf';
        } catch (err) {
            console.error('Model loading error:', err);
            status.innerHTML = '❌ فشل تحميل النموذج. تأكد من وجود model.json وملفات bin.';
            status.style.background = '#f5c6cb';
        }
    }

    async function generatePalette() {
        if (!modelReady) { alert("النموذج لم يكتمل تحميله"); return; }
        const hex = document.getElementById('hexInput').value;
        if (!/^#[0-9A-Fa-f]{6}$/.test(hex)) {
            alert("صيغة اللون غير صحيحة (مثال: #3498db)");
            return;
        }
        const rgbInput = hexToRgb(hex);
        const inputTensor = tf.tensor2d([rgbInput], [1, 3]);
        const outputTensor = model.predict(inputTensor);
        const outputData = await outputTensor.data();
        inputTensor.dispose();
        outputTensor.dispose();

        const colors = [];
        for (let i = 0; i < 3; i++) {
            colors.push([outputData[i*3], outputData[i*3+1], outputData[i*3+2]]);
        }
        displayPalette(hex, colors);
    }

    function displayPalette(inputHex, predictedRgb) {
        const container = document.getElementById('paletteContainer');
        container.innerHTML = '';
        const inputCard = document.createElement('div');
        inputCard.className = 'color-card';
        inputCard.innerHTML = `<div class="swatch" style="background-color: ${inputHex};"></div><div class="hex-label">🎨 مدخل<br>${inputHex}</div>`;
        container.appendChild(inputCard);
        for (let i=0; i<predictedRgb.length; i++) {
            const hex = rgbToHex(predictedRgb[i]);
            const card = document.createElement('div');
            card.className = 'color-card';
            card.innerHTML = `<div class="swatch" style="background-color: ${hex};"></div><div class="hex-label">لون ${i+1}<br>${hex}</div>`;
            container.appendChild(card);
        }
    }

    window.onload = async () => {
        await loadModel();
        const picker = document.getElementById('colorPicker');
        const hexInput = document.getElementById('hexInput');
        const preview = document.getElementById('preview');
        picker.addEventListener('input', () => {
            hexInput.value = picker.value.toUpperCase();
            preview.style.backgroundColor = picker.value;
        });
        hexInput.addEventListener('change', () => {
            let val = hexInput.value.trim();
            if (!val.startsWith('#')) val = '#' + val;
            if (/^#[0-9A-Fa-f]{6}$/i.test(val)) {
                picker.value = val;
                preview.style.backgroundColor = val;
            } else {
                hexInput.value = picker.value;
            }
        });
        document.getElementById('generateBtn').addEventListener('click', generatePalette);
        if (modelReady) setTimeout(generatePalette, 200);
    };
</script>
</body>
</html>
